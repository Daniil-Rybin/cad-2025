<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список заказов</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f5f5f5; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4CAF50; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            display: inline-block;
        }
        .btn:hover { background-color: #45a049; }
        .btn-small {
            background-color: #2196F3;
            color: white;
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
        }
        .btn-small:hover { background-color: #0b7dda; }
        .status-NEW { color: orange; font-weight: bold; }
        .status-PAID { color: green; font-weight: bold; }
        .status-CANCELLED { color: red; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>Управление заказами</h1>

    <a href="/zoostore/orders/new" class="btn">+ Создать новый заказ</a>

    <h2>Список заказов</h2>

    <table>
        <thead>
        <tr>
            <th>№ заказа</th>
            <th>Клиент</th>
            <th>Дата</th>
            <th>Сумма</th>
            <th>Статус</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.customer.name}">Иван Петров</td>
            <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">16.03.2026 12:00</td>
            <td th:text="${order.totalPrice} + ' руб.'">1000 руб.</td>
            <td>
                        <span th:text="${order.status}"
                              th:class="${'status-' + order.status}">NEW</span>
            </td>
            <td>
                <a th:href="@{/orders/{id}(id=${order.id})}" class="btn-small">Детали</a>
            </td>
        </tr>
        <tr th:if="${orders.empty}">
            <td colspan="6" style="text-align: center;">Заказов пока нет</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
