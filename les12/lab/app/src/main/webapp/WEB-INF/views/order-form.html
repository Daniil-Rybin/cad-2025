<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новый заказ</title>
    <style>
        body { font-family: Arial; margin: 20px; background-color: #f5f5f5; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; }
        h1 { color: #333; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .product-row {
            background-color: #f9f9f9;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
        }
        .btn:hover { background-color: #45a049; }
        .btn-cancel { background-color: #f44336; }
        .btn-cancel:hover { background-color: #da190b; }
        .add-btn {
            background-color: #2196F3;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 0;
        }
        .remove-btn {
            background-color: #ff4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Создание нового заказа</h1>

    <form action="/zoostore/orders" method="post">
        <div class="form-group">
            <label for="customerId">Клиент:</label>
            <select id="customerId" name="customerId" required>
                <option value="">-- Выберите клиента --</option>
                <option th:each="customer : ${customers}"
                        th:value="${customer.id}"
                        th:text="${customer.name} + ' (' + ${customer.email} + ')'">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label for="shippingAddress">Адрес доставки:</label>
            <input type="text" id="shippingAddress" name="shippingAddress"
                   placeholder="Введите адрес доставки" required />
        </div>

        <h3>Товары в заказе</h3>

        <div id="items-container">
            <div class="product-row">
                <select name="items[0].productId" required>
                    <option value="">-- Выберите товар --</option>
                    <option th:each="product : ${products}"
                            th:value="${product.id}"
                            th:text="${product.name} + ' (' + ${product.price} + ' руб., остаток: ' + ${product.stockQuantity} + ')'">
                    </option>
                </select>

                <input type="number" name="items[0].quantity"
                       placeholder="Количество" min="1" required />

                <button type="button" class="remove-btn" onclick="removeItem(this)">Удалить</button>
            </div>
        </div>

        <button type="button" class="add-btn" onclick="addItem()">+ Добавить товар</button>

        <div style="margin-top: 20px;">
            <button type="submit" class="btn">Создать заказ</button>
            <a href="/zoostore/orders" class="btn btn-cancel">Отмена</a>
        </div>
    </form>
</div>

<script>
    let itemCount = 1;
    function addItem() {
        const container = document.getElementById('items-container');

        const newRow = document.createElement('div');
        newRow.className = 'product-row';

        const select = document.createElement('select');
        select.name = 'items[' + itemCount + '].productId';
        select.required = true;

        const emptyOption = document.createElement('option');
        emptyOption.value = '';
        emptyOption.textContent = '-- Выберите товар --';
        select.appendChild(emptyOption);

        const firstSelect = document.querySelector('select[name="items[0].productId"]');
        if (firstSelect) {
            for (let i = 1; i < firstSelect.options.length; i++) {
                const option = document.createElement('option');
                option.value = firstSelect.options[i].value;
                option.textContent = firstSelect.options[i].textContent;
                select.appendChild(option);
            }
        }

        const input = document.createElement('input');
        input.type = 'number';
        input.name = 'items[' + itemCount + '].quantity';
        input.placeholder = 'Количество';
        input.min = '1';
        input.required = true;

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = 'Удалить';
        removeBtn.onclick = function() { removeItem(this); };

        newRow.appendChild(select);
        newRow.appendChild(input);
        newRow.appendChild(removeBtn);

        container.appendChild(newRow);
        itemCount++;
    }

    function removeItem(button) {
        const row = button.parentElement;
        const container = document.getElementById('items-container');

        if (container.children.length > 1) {
            row.remove();
        } else {
            alert('Должен быть хотя бы один товар в заказе');
        }
    }
</script>
</body>
</html>
